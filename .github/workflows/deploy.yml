name: CI-CD

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    #  IMPORTANT: set VERSION correctly
    - name: Set VERSION
      run: echo "VERSION=v${{ github.run_number }}" >> $GITHUB_ENV

    #  Docker login
    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    #  Build Backend
    - name: Build Backend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-app:$VERSION ./backend
        docker push ${{ secrets.DOCKER_USERNAME }}/backend-app:$VERSION

    #  Build Frontend
    - name: Build Frontend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:$VERSION ./frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:$VERSION

    #  Install oc
    - name: Install oc
      run: |
        curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz
        tar -xvf oc.tar.gz
        sudo mv oc /usr/local/bin

    #  Login OpenShift
    - name: Login OpenShift
      run: |
        oc login --token=${{ secrets.OPENSHIFT_TOKEN }} --server=${{ secrets.OPENSHIFT_SERVER }}

    - name: Set Project
      run: oc project vsarode000-dev

    #  Deploy
    - name: Deploy Backend
      run: |
        oc set image deployment/backend-dev backend=${{ secrets.DOCKER_USERNAME }}/backend-app:$VERSION

    - name: Deploy Frontend
      run: |
        oc set image deployment/frontend-dev frontend=${{ secrets.DOCKER_USERNAME }}/frontend-app:$VERSION
