apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-dev
  labels:
    app: three-tier
    tier: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-dev
  template:
    metadata:
      labels:
        app: mongo-dev
        tier: database
    spec:
      containers:
      - name: mongo
        image: registry.redhat.io/rhscl/mongodb-36-rhel7
        ports:
        - containerPort: 27017

        env:
        - name: MONGODB_USER
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: MONGO_USER
        - name: MONGODB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: MONGO_PASSWORD
        - name: MONGODB_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: MONGO_PASSWORD
        - name: MONGODB_DATABASE
          value: test

        volumeMounts:
        - mountPath: /var/lib/mongodb/data/db   # 🔥 FIXED
          name: mongo-storage

        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 5
          periodSeconds: 5

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

      volumes:
      - name: mongo-storage
        persistentVolumeClaim:
          claimName: mongo-pvc
