apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-dev
  template:
    metadata:
      labels:
        app: mongo-dev
    spec:
      containers:
      - name: mongo
        image: registry.redhat.io/rhscl/mongodb-36-rhel7
        ports:
        - containerPort: 27017
        env:
        - name: MONGODB_USER
          value: admin
        - name: MONGODB_PASSWORD
          value: password
        - name: MONGODB_DATABASE
          value: test
        - name: MONGODB_ADMIN_PASSWORD
          value: password
